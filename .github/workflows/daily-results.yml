name: Daily Stock Result Download

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: '17 15 * * *'

jobs:
  download-results:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Screener latest results scraper
        run: python src/main.py
        env:
          SCREENER_EMAIL: ${{ secrets.SCREENER_EMAIL }}
          SCREENER_PASSWORD: ${{ secrets.SCREENER_PASSWORD }}
          SCREENER_RESULTS_DATE: ${{ env.RUN_DATE }} # or leave unset to use today

      - name: Upload metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: result-metadata
          path: data/metadata/
          if-no-files-found: warn
