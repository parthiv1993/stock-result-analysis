name: Daily Stock Result Download

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - 'data/**'
  schedule:
    - cron: '17 15 * * *'

jobs:
  download-results:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run Screener latest results scraper
        run: python src/main.py
        env:
          SCREENER_EMAIL: ${{ secrets.SCREENER_EMAIL }}
          SCREENER_PASSWORD: ${{ secrets.SCREENER_PASSWORD }}
          SCREENER_RESULTS_DATE: ${{ vars.SCREENER_RESULTS_DATE }}

      - name: Upload scraper outputs
        uses: actions/upload-artifact@v4
        with:
          name: screener-output-${{ github.run_number }}
          path: |
            data/**/*.csv
            data/**/*.xlsx
            data/metadata/**/*.html
            data/metadata/**/*.txt
          if-no-files-found: error
          overwrite: true

      - name: Commit generated data files
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Update screener result files [skip ci]"
          file_pattern: data/*.csv data/*.xlsx