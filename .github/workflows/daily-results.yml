name: Daily Stock Result Download

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: '17 15 * * *'

jobs:
  download-results:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Screener latest results scraper
        run: python src/main.py
        env:
          SCREENER_EMAIL: ${{ secrets.SCREENER_EMAIL }}
          SCREENER_PASSWORD: ${{ secrets.SCREENER_PASSWORD }}
          SCREENER_RESULTS_DATE: ${{ vars.SCREENER_RESULTS_DATE }}
          
      - name: Debug paths
        run: |
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          pwd
          python - <<'PY'
          from pathlib import Path
          p = Path("src/main.py").resolve()
          print("main.py =", p)
          print("parent =", p.parent)
          print("parents[1] =", p.parents[1])
          print("workspace files:")
          for x in Path(".").glob("**/*"):
              if x.is_file():
                  print(x)
          PY

      - name: Upload scraper outputs
        uses: actions/upload-artifact@v4
        with:
          name: screener-output
          path: data/metadata/
          if-no-files-found: error
